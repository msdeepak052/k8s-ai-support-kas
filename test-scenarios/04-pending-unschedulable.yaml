# ============================================================
# SCENARIO 4: Pending — PVC not bound
# A PVC referencing a StorageClass that does not exist stays
# in Pending indefinitely. A Pod mounting that PVC also stays
# in Pending — it cannot be scheduled until the volume is ready.
#
# Test with:
#   kas "pending-pvc-not-bound pod is stuck" -n kas-test
#   kas "why is stuck-pvc not binding?" -n kas-test -r stuck-pvc -t pvc
# ============================================================

# PVC with non-existent StorageClass — will stay Pending
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stuck-pvc
  namespace: kas-test
  labels:
    scenario: pending
    reason: no-storage-class
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ultra-fast-nvme-does-not-exist
  resources:
    requests:
      storage: 50Gi

---
# Pod waiting for the stuck PVC above — will stay Pending
apiVersion: v1
kind: Pod
metadata:
  name: pending-pvc-not-bound
  namespace: kas-test
  labels:
    scenario: pending
    reason: pvc-not-bound
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: data
          mountPath: /data
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: stuck-pvc
  restartPolicy: Always
