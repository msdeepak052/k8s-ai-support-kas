# ============================================================
# SCENARIO 7: Missing Secret / ConfigMap
# Pods that reference Secrets and ConfigMaps which do not
# exist. Both stay in CreateContainerConfigError — Kubernetes
# cannot start the container because it cannot mount/inject
# the referenced resource.
#
# Test with:
#   kas "missing-secret-pod not starting" -n kas-test
#   kas "why is missing-secret-pod in error?" -n kas-test -r missing-secret-pod -t pod
#   kas "missing-configmap-pod stuck" -n kas-test
# ============================================================

# Pod A: References a Secret that does not exist
# Shows CreateContainerConfigError (env injection failure)
apiVersion: v1
kind: Pod
metadata:
  name: missing-secret-pod
  namespace: kas-test
  labels:
    scenario: missing-secret
    reason: secret-not-found
    app: missing-secret-test
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials          # This Secret does not exist
              key: password
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: external-api-secret     # This Secret does not exist either
              key: api_key
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "32Mi"
  restartPolicy: Always

---
# Pod B: References a ConfigMap that does not exist
# Shows CreateContainerConfigError (volume mount failure)
apiVersion: v1
kind: Pod
metadata:
  name: missing-configmap-pod
  namespace: kas-test
  labels:
    scenario: missing-secret
    reason: configmap-not-found
    app: missing-secret-test
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      volumeMounts:
        - name: app-config
          mountPath: /etc/app
          readOnly: true
      env:
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-settings           # This ConfigMap does not exist
              key: log_level
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
        limits:
          cpu: "50m"
          memory: "32Mi"
  volumes:
    - name: app-config
      configMap:
        name: app-config                   # This ConfigMap does not exist
  restartPolicy: Always
